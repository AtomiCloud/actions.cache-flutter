name: Cache Flutter Packages
description: "Cache Flutter (Pub), Android (Gradle) & iOS (CocoaPods) packages compatible with Namespace Lab's runners"
inputs:
  namespacelabs:
    default: 'true'
    description: "Using Namespace Lab's runners"
branding:
  color: blue
  icon: archive
runs:
  using: 'composite'
  steps:
    # NAMESPACE LAB VERSION
    - uses: namespacelabs/nscloud-cache-action@v1
      with:
        path: |
          ~/.pub-cache
          ~/.gradle/caches
          ~/.gradle/wrapper
          ~/.cocoapods
      if: inputs.namespacelabs == 'true'

    # NATIVE VERSION
    - uses: actions/cache@v5
      with:
        path: |
          ~/.pub-cache
          ~/.gradle/caches
          ~/.gradle/wrapper
          ~/.cocoapods
        key: ${{ runner.os }}-flutter-${{ hashFiles('**/pubspec.lock', '**/gradle-wrapper.properties', '**/Podfile.lock') }}
        restore-keys: |
          ${{ runner.os }}-flutter-
      if: inputs.namespacelabs == 'false'
